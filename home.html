<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link rel="stylesheet" href="./style/style.css" />

    <!-- Tailwind and Daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
  <!-- This is the header section -->
    <header class="md:flex justify-between items-center px-[80px] py-[23px] bg-[#FFFFFF]">
      <div class="flex items-center gap-2 mb-4 md:mb-0">
        <img class="w-[36px] h-[37px]" src="./assets/github-logo.png" alt="" />
        <h2 class="text-[24px] font-semibold">GitHub Issues Tracker</h2>
      </div>

      <div>
        <div class="join">
          <div>
            <label  class="input validator join-item rounded-sm" >
              🔍 <input  type="email" placeholder="Search issues.." required />
            </label>
            <div class="validator-hint hidden">Enter valid email address</div>
          </div>
          <button  class="btn btn-primary join-item ml-6 rounded-sm"><span><i class="fa-solid fa-plus"></i></span>New Issue</button>
        </div>
      </div>
    </header>
<!-- This is the tab section -->
    <section class="p-[24px] max-w-[1110px] mx-auto my-[60px] bg-[#FFFFFF] rounded-md">
      <div class="flex gap-2 ">
        <button id="all-btn" class="btn btn-primary">All</button>
        <button id="open-btn" class="btn border-t-neutral-100 ">Open</button>
        <button id="closed-btn"  class="btn border-t-neutral-100 ">Closed</button>
      </div>
    </section>
<!-- This is the all issues cards section -->
    <section class="p-[24px] max-w-[1110px] mx-auto mt-[60px] bg-[#FFFFFF] md:flex flex-row justify-between items-center">
      <div class="flex items-center gap-2">
          <span class="rounded-full w-[50px] h-[50px] flex justify-center items-center bg-[#ECE4FF]"><img src="./assets/Aperture.png" alt="">
          </span>
        <div>
          <h2 class="text-[20px] font-semibold"><span  id="issues-count">50</span> Issues</h2>
          <p class="text-[16px] text-[#64748B]">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex items-center gap-3 mt-4 ml-3 md:mt-0 md:ml-0">
        <div id="tab-open" class="flex items-center gap-2 hidden">
          <div class="w-[12px] h-[12px] bg-[#00A96E] rounded-full"></div>
          <p>Open</p>
        </div>
        <div id="tab-closed" class="flex items-center gap-2 hidden">
          <div class="w-[12px] h-[12px] bg-[#A855F7] rounded-full"></div>
          <p>Closed</p>
        </div>
      </div>
    </section>
    
<section id="issues-container" class="grid grid-cols-2  md:grid-cols-3 lg:grid-cols-4 gap-[12px] all-card p-[24px] max-w-[1110px] mx-auto bg-[#FFFFFF] ">
