<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="stylesheet" href="./style/style.css">

    <!-- Tailwind and Daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<!-- FontAwesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <section class="min-h-screen max-w-md mx-auto bg-[#FFFFFF]">
        <img class="mx-auto pt-10" src="./assets/github-logo.png" alt="">
        <div  class="text-center mt-[24px] "> 
            <h2 class="text-[32px] font-semibold mb-1">GitHub Issues Tracker</h2>
            <p class="text-[16px]">Sign in to manage your issues</p>
        </div>
         <div class="card  w-full mx-auto max-w-sm shrink-0">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label">Username</label>
          <input id="input-username" type="email" class="input" placeholder="Enter Username" maxlength="5"/>
          <p class="text-[14px] text-[#4A00FF]">Default: admin</p>
          <label class="label">Password</label>
          <input id="input-password" type="password" class="input" placeholder="Enter Password" maxlength="8"/>
          <p class="text-[14px] text-[#4A00FF]">Default: admin123</p>
          <button id="login-btn" class="btn btn-primary mt-4">Login</button>
        </fieldset>
      </div>
    </div>   
    </section>



    <script src="./script/login.js"></script>
    <script src="./script/home.js"></script>
</body>
</html>
